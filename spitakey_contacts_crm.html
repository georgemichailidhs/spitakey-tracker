<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spitakey — Contacts CRM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;font-size:14px;background:#F8F5FF;color:#1A1A1A;min-height:100vh}
.header{background:#5B2D8E;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header h1{color:white;font-size:18px;font-weight:600}
.header p{color:#D4BFFF;font-size:12px;margin-top:2px}
.main{max-width:1100px;margin:0 auto;padding:20px}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.stat{background:white;border:0.5px solid #E0D6FF;border-radius:10px;padding:12px;text-align:center}
.stat-num{font-size:22px;font-weight:600;color:#5B2D8E}
.stat-lbl{font-size:11px;color:#888;margin-top:2px}
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.toolbar input,.toolbar select{font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 12px;border:0.5px solid #D1C4E9;border-radius:8px;background:white;color:#1A1A1A;outline:none}
.toolbar input{flex:1;min-width:160px}
.toolbar input:focus,.toolbar select:focus{border-color:#5B2D8E}
.add-btn{padding:7px 16px;border-radius:8px;border:none;background:#5B2D8E;color:white;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;white-space:nowrap}
.add-btn:hover{background:#4A235A}
.tbl-wrap{background:white;border:0.5px solid #E0D6FF;border-radius:12px;overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:950px}
th{background:#F9F5FF;color:#4A235A;font-weight:500;font-size:12px;padding:10px 12px;text-align:left;border-bottom:0.5px solid #E0D6FF;white-space:nowrap}
td{padding:8px 12px;border-bottom:0.5px solid #F3EFFE;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFAFF}
.editable{background:transparent;border:none;font-family:'DM Sans',sans-serif;font-size:13px;color:#1A1A1A;width:100%;outline:none;min-width:80px}
.editable:focus{background:#F3EFFE;border-radius:4px;padding:1px 4px}
select.editable{cursor:pointer}
.num-cell{color:#AAA;font-size:12px;min-width:28px}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;cursor:pointer}
.b0{background:#F1EFE8;color:#5F5E5A}
.b1{background:#E6F1FB;color:#185FA5}
.b2{background:#FAEEDA;color:#854F0B}
.b3{background:#EAF3DE;color:#3B6D11}
.b4{background:#FFEBEE;color:#C62828}
.b5{background:#F3EFFE;color:#5B2D8E}
.type-badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500}
.t0{background:#E3F2FD;color:#0D47A1}
.t1{background:#E8F5E9;color:#1B5E20}
.t2{background:#FFF8E1;color:#E65100}
.t3{background:#F3EFFE;color:#5B2D8E}
.t4{background:#FFEBEE;color:#C62828}
.del-btn{background:none;border:none;cursor:pointer;color:#CCC;font-size:16px;padding:3px 6px;border-radius:4px}
.del-btn:hover{color:#C62828;background:#FFEBEE}
.empty-row td{text-align:center;color:#AAA;padding:32px}
.follow-up-due{color:#C62828;font-weight:600}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px;font-size:12px;color:#888}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:8px;height:8px;border-radius:50%}
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>👥 Spitakey — Contacts CRM</h1>
    <p>Επαφές από εκθέσεις, networking, partnerships</p>
  </div>
  <div style="color:#D4BFFF;font-size:12px;text-align:right">spitakey.gr · Μάιος 2026</div>
</div>
<div class="main">
  <div class="stats" id="statsRow"></div>
  <div class="toolbar">
    <input type="text" id="searchBox" placeholder="🔍 Αναζήτηση ονόματος / εταιρείας..." oninput="render()" />
    <select id="filterType" onchange="render()">
      <option value="">Όλοι οι τύποι</option>
      <option>Landlord</option>
      <option>Journalist</option>
      <option>Partner</option>
      <option>Investor</option>
      <option>Other</option>
    </select>
    <select id="filterStatus" onchange="render()">
      <option value="">Όλα τα status</option>
      <option>Νέα επαφή</option>
      <option>Επικοινώνησα</option>
      <option>Αναμένει απάντηση</option>
      <option>Θετικός</option>
      <option>Ολοκληρώθηκε</option>
      <option>Αρνητικός</option>
    </select>
    <select id="filterEvent" onchange="render()">
      <option value="">Όλα τα events</option>
      <option>Real Estate Expo 2026</option>
      <option>PropTech Connect</option>
      <option>LinkedIn</option>
      <option>Referral</option>
      <option>Cold outreach</option>
      <option>Άλλο</option>
    </select>
    <button class="add-btn" onclick="addRow()">+ Νέα επαφή</button>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th>#</th><th>Όνομα</th><th>Εταιρεία / Ιδιότητα</th>
        <th>Τύπος</th><th>Τηλέφωνο / Email</th>
        <th>Event / Πηγή</th><th>Τι συζητήθηκε</th>
        <th>Status</th><th>Follow-up</th><th>Επόμενο βήμα</th><th></th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#B4B2A9"></div>Νέα επαφή</div>
    <div class="legend-item"><div class="legend-dot" style="background:#185FA5"></div>Επικοινώνησα</div>
    <div class="legend-item"><div class="legend-dot" style="background:#854F0B"></div>Αναμένει</div>
    <div class="legend-item"><div class="legend-dot" style="background:#3B6D11"></div>Θετικός</div>
    <div class="legend-item"><div class="legend-dot" style="background:#5B2D8E"></div>Ολοκληρώθηκε</div>
    <div class="legend-item"><div class="legend-dot" style="background:#C62828"></div>Αρνητικός</div>
    <div class="legend-item" style="margin-left:auto;color:#C62828;font-weight:500">🔴 = Follow-up εκπρόθεσμο</div>
  </div>
</div>
<script>
const KEY="spitakey_crm_v1";
const STATUSES=["Νέα επαφή","Επικοινώνησα","Αναμένει απάντηση","Θετικός","Ολοκληρώθηκε","Αρνητικός"];
const BC=["b0","b1","b2","b3","b5","b4"];
const TYPES=["Landlord","Journalist","Partner","Investor","Other"];
const TC=["t0","t1","t2","t3","t4"];
const EVENTS=["Real Estate Expo 2026","PropTech Connect","LinkedIn","Referral","Cold outreach","Άλλο"];

function mk(){return{name:"",company:"",type:"Landlord",contact:"",event:"Real Estate Expo 2026",notes:"",status:"Νέα επαφή",followup:"",next:""};}
function load(){try{const s=localStorage.getItem(KEY);if(s)return JSON.parse(s);}catch(e){}return Array.from({length:5},mk);}
let data=load();
function save(){try{localStorage.setItem(KEY,JSON.stringify(data));}catch(e){}}
function upd(i,f,v){data[i][f]=v;save();renderStats();}
function addRow(){data.push(mk());save();render();setTimeout(()=>{const e=document.querySelectorAll('.ni');if(e.length)e[e.length-1].focus();},60);}
function delRow(i){if(confirm("Διαγραφή επαφής;")){{data.splice(i,1);save();render();}}}
function selO(arr,cur,cls){return arr.map((a,i)=>`<option${a===cur?' selected':''}>${a}</option>`).join("");}
function cycleStatus(i,el){const n=(STATUSES.indexOf(data[i].status)+1)%STATUSES.length;data[i].status=STATUSES[n];save();el.textContent=data[i].status;el.className="badge "+BC[n];renderStats();}

function isOverdue(d){if(!d)return false;return new Date(d)<new Date();}

function renderStats(){
  const f=data.filter(r=>r.name.trim());
  const c={};STATUSES.forEach(s=>c[s]=0);f.forEach(r=>c[r.status]=(c[r.status]||0)+1);
  const types={};TYPES.forEach(t=>types[t]=0);f.forEach(r=>types[r.type]=(types[r.type]||0)+1);
  document.getElementById("statsRow").innerHTML=[
    {l:"Σύνολο επαφών",v:f.length},
    {l:"Landlords",v:types["Landlord"]||0},
    {l:"Journalists",v:types["Journalist"]||0},
    {l:"Partners",v:types["Partner"]||0},
    {l:"Investors",v:types["Investor"]||0},
  ].map(s=>`<div class="stat"><div class="stat-num">${s.v}</div><div class="stat-lbl">${s.l}</div></div>`).join("");
}

function render(){
  const q=document.getElementById("searchBox").value.toLowerCase();
  const ft=document.getElementById("filterType").value;
  const fs=document.getElementById("filterStatus").value;
  const fe=document.getElementById("filterEvent").value;
  const fil=data.map((r,i)=>({...r,_i:i})).filter(r=>{
    if(q&&!r.name.toLowerCase().includes(q)&&!r.company.toLowerCase().includes(q))return false;
    if(ft&&r.type!==ft)return false;
    if(fs&&r.status!==fs)return false;
    if(fe&&r.event!==fe)return false;
    return true;
  });
  const tb=document.getElementById("tbody");
  if(!fil.length){tb.innerHTML=`<tr class="empty-row"><td colspan="11">Δεν βρέθηκαν επαφές</td></tr>`;renderStats();return;}
  tb.innerHTML=fil.map(r=>{
    const i=r._i;
    const bc=BC[STATUSES.indexOf(r.status)]||"b0";
    const ti=TYPES.indexOf(r.type);
    const tc_=TC[ti]||"t0";
    const due=isOverdue(r.followup);
    return`<tr>
      <td class="num-cell">${i+1}</td>
      <td><input class="editable ni" value="${r.name}" placeholder="Όνομα..." onchange="upd(${i},'name',this.value)"/></td>
      <td><input class="editable" value="${r.company}" placeholder="Εταιρεία..." onchange="upd(${i},'company',this.value)" style="min-width:120px"/></td>
      <td><span class="type-badge ${tc_}" style="cursor:pointer" onclick="cycleType(${i},this)">${r.type}</span></td>
      <td><input class="editable" value="${r.contact}" placeholder="τηλ/email..." onchange="upd(${i},'contact',this.value)" style="min-width:120px"/></td>
      <td><select class="editable" onchange="upd(${i},'event',this.value)">${selO(EVENTS,r.event)}</select></td>
      <td><input class="editable" value="${r.notes}" placeholder="Σύντομες σημειώσεις..." onchange="upd(${i},'notes',this.value)" style="min-width:140px"/></td>
      <td><span class="badge ${bc}" onclick="cycleStatus(${i},this)">${r.status}</span></td>
      <td><input type="date" class="editable${due?' follow-up-due':''}" value="${r.followup}" onchange="upd(${i},'followup',this.value)" style="min-width:120px"/></td>
      <td><input class="editable" value="${r.next}" placeholder="Επόμενο βήμα..." onchange="upd(${i},'next',this.value)" style="min-width:140px"/></td>
      <td><button class="del-btn" onclick="delRow(${i})" title="Διαγραφή">✕</button></td>
    </tr>`;
  }).join("");
  renderStats();
}

function cycleType(i,el){
  const n=(TYPES.indexOf(data[i].type)+1)%TYPES.length;
  data[i].type=TYPES[n];save();
  el.textContent=data[i].type;el.className="type-badge "+TC[n];
  renderStats();
}
render();
</script>
</body>
</html>
